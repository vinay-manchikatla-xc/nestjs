name: Trigger Vector DB Update

on:
  push:
    branches:
      - main

jobs:
  notify-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          json: true

      - name: Send Webhook to NestJS
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.NESTJS_WEBHOOK_URL }}
          method: 'POST'
          # Ensure customHeaders is a valid JSON string
          customHeaders: '{"Content-Type": "application/json", "x-hub-signature-256": "${{ secrets.WEBHOOK_SECRET }}", "x-github-event": "push"}'
          # Using a single-line data entry to prevent YAML block-formatting issues
          data: '{"ref": "${{ github.ref }}", "repository": {"full_name": "${{ github.repository }}"}, "commits": [{"added": ${{ steps.changed-files.outputs.added_files }}, "modified": ${{ steps.changed-files.outputs.modified_files }}, "removed": ${{ steps.changed-files.outputs.deleted_files }} }]}'
