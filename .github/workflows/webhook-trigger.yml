name: Trigger Vector DB Update

on:
  push:
    branches:
      - main
    paths:
      # ACTION TRIGGER LEVEL: The workflow will ONLY run if at least one .md file is changed.
      # This saves CI/CD minutes and prevents unnecessary webhook calls.
      - '**.md'

jobs:
  notify-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Construct JSON Payload
        run: |
          jq '{
            ref: .ref,
            repository: { full_name: .repository.full_name },
            commits: [
              {
                added: ([(.commits[]?.added[]?)] | unique | map(select(test("\\.md$")))),
                modified: ([(.commits[]?.modified[]?)] | unique | map(select(test("\\.md$")))),
                removed: ([(.commits[]?.removed[]?)] | unique | map(select(test("\\.md$"))))
              }
            ]
          }' "$GITHUB_EVENT_PATH" > payload.json

          echo "Payload successfully constructed:"
          cat payload.json

      - name: Generate HMAC Signature
        id: sign
        env:
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          SIGNATURE=$(node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const payload = fs.readFileSync('payload.json', 'utf8');
            const hmac = crypto.createHmac('sha256', process.env.SECRET);
            console.log('sha256=' + hmac.update(payload).digest('hex'));
          ")
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Send Webhook
        env:
          WEBHOOK_URL: ${{ secrets.NESTJS_WEBHOOK_URL }}
        run: |
          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-github-event: push" \
            -H "x-hub-signature-256: ${{ steps.sign.outputs.signature }}" \
            -d @payload.json)
            
          echo "HTTP Response Status: $HTTP_STATUS"
          cat response.txt

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo -e "\nWebhook failed."
            exit 1
          fi
