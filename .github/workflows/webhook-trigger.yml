name: Trigger Vector DB Update

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  notify-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Construct JSON Payload via GitHub API
        env:
          # Automatically provided by GitHub Actions, no setup needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch exact commit details using GitHub CLI and format using jq
          gh api repos/${{ github.repository }}/commits/${{ github.sha }} | jq '{
            ref: "${{ github.ref }}",
            repository: { full_name: "${{ github.repository }}" },
            commits: [
              {
                added: (if .files then [.files[] | select(.status == "added" and (.filename | test("\\.md$"))) | .filename] else [] end),
                modified: (if .files then [.files[] | select(.status == "modified" and (.filename | test("\\.md$"))) | .filename] else [] end),
                removed: (if .files then [.files[] | select(.status == "removed" and (.filename | test("\\.md$"))) | .filename] else [] end)
              }
            ]
          }' > payload.json
          
          echo "Payload successfully constructed:"
          cat payload.json

      - name: Generate HMAC Signature
        id: sign
        env:
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          SIGNATURE=$(node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const payload = fs.readFileSync('payload.json', 'utf8');
            const hmac = crypto.createHmac('sha256', process.env.SECRET);
            console.log('sha256=' + hmac.update(payload).digest('hex'));
          ")
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Send Webhook
        env:
          WEBHOOK_URL: ${{ secrets.NESTJS_WEBHOOK_URL }}
        run: |
          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-github-event: push" \
            -H "x-hub-signature-256: ${{ steps.sign.outputs.signature }}" \
            -d @payload.json)
            
          echo "HTTP Response Status: $HTTP_STATUS"
          cat response.txt

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo -e "\nWebhook failed."
            exit 1
          fi